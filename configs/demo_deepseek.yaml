# SkillOpt SearchQA Demo - DeepSeek API (minimal config for quick validation)
_base_: ../_base_/default.yaml

model:
  optimizer: deepseek-chat
  target: deepseek-chat
  optimizer_backend: openai_chat
  target_backend: openai_chat
  reasoning_effort: ""
  azure_openai_endpoint: "https://api.deepseek.com/v1"
  azure_openai_auth_mode: openai_compatible

train:
  num_epochs: 2
  train_size: 30
  batch_size: 15
  accumulation: 1
  seed: 42

gradient:
  minibatch_size: 4
  merge_batch_size: 4
  analyst_workers: 4
  max_analyst_rounds: 2
  failure_only: false

optimizer:
  learning_rate: 4
  min_learning_rate: 2
  lr_scheduler: constant
  skill_update_mode: patch
  use_slow_update: false
  use_meta_skill: false

evaluation:
  use_gate: true
  sel_env_num: 0
  test_env_num: 0
  eval_test: true

env:
  name: searchqa
  skill_init: skillopt/envs/searchqa/skills/initial.md
  split_mode: split_dir
  split_dir: data/searchqa_demo_split
  max_turns: 1
  max_completion_tokens: 4096
  workers: 4
  limit: 0
  out_root: outputs/demo_searchqa_deepseek
